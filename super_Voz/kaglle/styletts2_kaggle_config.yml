# processed_audio_candidates: # DESATIVADO PARA GARANTIR LIMPEZA COMPLETA
#   - "Audios_processados"
#   - "/kaggle/input/super-voz/Audios_processados"

speaker: "0"
sample_rate: 24000
val_ratio: 0.05
phonemize: true
phonemizer_language: "pt-br"

# Configuração otimizada rigorosa para Kaggle P100/T4 (evitar OOM)
epochs: 50
batch_size: 2
max_len: 128
save_freq: 1
log_interval: 10

joint_epoch: 999
diff_epoch: 10

batch_percentage: 0.0625
slm_min_len: 100
slm_max_len: 150

max_audio_seconds: 10
max_text_chars: 200
