
repo_url: "https://github.com/warllemedicao/voz_stylle.git"
repo_dir: "/kaggle/working/Super_voz"
project_subdir: "super_Voz"

# Motor TTS principal do projeto.
# f5_tts_ptbr: usa uma biblioteca/base F5-TTS em portugues brasileiro separada dos checkpoints da voz.
# styletts2: legado; nao recomendado para PT-BR quando depender do fallback LibriTTS em ingles.
tts_engine: "f5_tts_ptbr"

styletts2_repo: "https://github.com/yl4579/StyleTTS2.git"
styletts2_dir: "/kaggle/working/StyleTTS2"
voice_package_dir: "minha_voz_styletts2"
f5_voice_package_dir: "minha_voz_f5_tts_ptbr"
model_library_root: "/kaggle/working/super_voz_model_library"
output_dir: "/kaggle/working/super_Voz_outputs"
r2_sync_interval_seconds: 600
enable_resemble_enhance: true
# Remove Audios_brutos e Audios_processados depois que o dataset final e o pacote forem criados.
cleanup_intermediate_audio: true
# Remove o dataset preparado de uma execucao anterior antes de gerar o dataset atual.
cleanup_previous_dataset: true

# Persistencia dos checkpoints e artefatos em Hugging Face Buckets.
# Crie um Kaggle Secret chamado HF_TOKEN com permissao de escrita no bucket.
huggingface:
  enabled: true
  # Aborta antes do treino se o bucket/token nao estiver acessivel, evitando acumular checkpoints locais.
  required: true
  token_env: "HF_TOKEN"
  bucket_uri: "hf://buckets/warllem/Super_voz"
  # Intervalo de checagem do monitor. Upload real ocorre apenas quando surge checkpoint novo
  # de epoca ou no encerramento critico/final.
  sync_interval_seconds: 300

# Biblioteca/base F5-TTS PT-BR. Ela fica separada dos checkpoints da voz neural.
# O runner tenta restaurar esta pasta do Hugging Face primeiro. Se nao existir,
# baixa de repo_id e envia para f5_tts_ptbr.huggingface_remote_dir para reutilizar nos proximos treinos.
f5_tts_ptbr:
  enabled: true
  repo_id: "firstpixel/F5-TTS-pt-br"
  local_dir: "/kaggle/working/super_voz_model_library/f5_tts_ptbr"
  huggingface_remote_dir: "libraries/f5_tts_ptbr"
  required_for_inference: true
  dataset_name: "super_voz_f5_ptbr"
  dataset_dir: "/kaggle/working/super_voz_f5_dataset"
  checkpoint_subpath: "pt-br/model_last.safetensors"
  exp_name: "F5TTS_Base"
  tokenizer: "char"
  prepare_as_pretrain: true
  epochs: 20
  learning_rate: 0.00001
  batch_size_per_gpu: 1600
  batch_size_type: "frame"
  max_samples: 32
  grad_accumulation_steps: 1
  num_warmup_updates: 100
  save_per_updates: 500
  last_per_updates: 100
  keep_last_n_checkpoints: 3
  mixed_precision: "fp16"

# Persistencia opcional via TeraBox.
# Recomendado: use Kaggle Secrets. Para o modo padrao abaixo, crie:
# TERABOX_NDUS, TERABOX_JS_TOKEN, TERABOX_CSRF_TOKEN, TERABOX_BROWSER_ID e TERABOX_NDUT_FMT.
# Como nao existe CLI oficial estavel do TeraBox, o upload usa um wrapper configuravel.
terabox:
  enabled: false
  ndus_env: "TERABOX_NDUS"
  cookie_ndus: ""
  cli_path: "/kaggle/working/TeraboxUploaderCLI"
  remote_styletts2_dir: "/StyleTTS2"
  remote_checkpoint_dir: "/StyleTTS2/Models/super_Voz"
  restore_share_url: "https://1024terabox.com/s/1Jh_22Dt3IqN0-70d9xAJaw"
  restore_share_password: "voz1"
  local_styletts2_dir: "/kaggle/working/StyleTTS2"
  sync_interval_seconds: 600
  # Copiar tudo para outra pasta duplica o uso de disco no Kaggle.
  keep_visible_outputs: false
  visible_output_dir: "/kaggle/working/super_voz_resultados"
  required_env:
    - "TERABOX_NDUS"
  upload_required_env:
    - "TERABOX_NDUS"
    - "TERABOX_JS_TOKEN"
    - "TERABOX_CSRF_TOKEN"
    - "TERABOX_BROWSER_ID"
    - "TERABOX_NDUT_FMT"
  install_commands: []
  login_command: []
  download_command:
    - "{python}"
    - "{script_dir}/terabox_uploadercli_sync.py"
    - "download"
    - "--local-dir"
    - "{local_dir}"
    - "--remote-dir"
    - "{remote_dir}"
    - "--tool-dir"
    - "{cli}"
    - "--share-url"
    - "{restore_share_url}"
    - "--share-password"
    - "{restore_share_password}"
  upload_command:
    - "{python}"
    - "{script_dir}/terabox_uploadercli_sync.py"
    - "upload"
    - "--local-dir"
    - "{local_dir}"
    - "--remote-dir"
    - "{remote_dir}"
    - "--tool-dir"
    - "{cli}"

# Cloudflare R2 e usado apenas para baixar audios brutos no Kaggle.
